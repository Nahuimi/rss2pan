name: Manual Build

on:
  workflow_dispatch:
    inputs:
      target:
        description: Build target
        required: true
        default: all
        type: choice
        options:
          - all
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - x86_64-pc-windows-msvc
          - x86_64-apple-darwin

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Select build matrix
        id: set-matrix
        shell: bash
        run: |
          case "${{ inputs.target }}" in
            all)
              matrix='{"include":[{"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest","archive_name":"rss2pan-x86_64-unknown-linux-gnu.tar.gz","use_cross":false},{"target":"x86_64-unknown-linux-musl","os":"ubuntu-latest","archive_name":"rss2pan-x86_64-unknown-linux-musl.tar.gz","use_cross":true},{"target":"x86_64-pc-windows-msvc","os":"windows-latest","archive_name":"rss2pan-x86_64-pc-windows-msvc.zip","use_cross":false},{"target":"x86_64-apple-darwin","os":"macos-latest","archive_name":"rss2pan-x86_64-apple-darwin.tar.gz","use_cross":false}]}'
              ;;
            x86_64-unknown-linux-gnu)
              matrix='{"include":[{"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest","archive_name":"rss2pan-x86_64-unknown-linux-gnu.tar.gz","use_cross":false}]}'
              ;;
            x86_64-unknown-linux-musl)
              matrix='{"include":[{"target":"x86_64-unknown-linux-musl","os":"ubuntu-latest","archive_name":"rss2pan-x86_64-unknown-linux-musl.tar.gz","use_cross":true}]}'
              ;;
            x86_64-pc-windows-msvc)
              matrix='{"include":[{"target":"x86_64-pc-windows-msvc","os":"windows-latest","archive_name":"rss2pan-x86_64-pc-windows-msvc.zip","use_cross":false}]}'
              ;;
            x86_64-apple-darwin)
              matrix='{"include":[{"target":"x86_64-apple-darwin","os":"macos-latest","archive_name":"rss2pan-x86_64-apple-darwin.tar.gz","use_cross":false}]}'
              ;;
            *)
              echo "unsupported target: ${{ inputs.target }}" >&2
              exit 1
              ;;
          esac

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Prepare Linux toolchain for rquest
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake perl pkg-config clang libclang-dev nasm
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools
          fi

      - name: Prepare Windows toolchain for rquest
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cmakeCandidates = @(
            'C:\Program Files\CMake\bin',
            'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin',
            'C:\Program Files\Microsoft Visual Studio\2022\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin'
          )
          foreach ($path in $cmakeCandidates) {
            if (Test-Path (Join-Path $path 'cmake.exe')) {
              $path | Out-File -FilePath $env:GITHUB_PATH -Append
              break
            }
          }

          if (-not (Get-Command nasm -ErrorAction SilentlyContinue)) {
            choco install nasm llvm -y --no-progress
          }

          $clangCandidates = @(
            'C:\Program Files\LLVM\bin',
            'C:\Program Files (x86)\LLVM\bin',
            'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Tools\Llvm\x64\bin',
            'C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Tools\Llvm\x64\bin'
          )
          foreach ($path in $clangCandidates) {
            if (Test-Path (Join-Path $path 'libclang.dll')) {
              "LIBCLANG_PATH=$path" | Out-File -FilePath $env:GITHUB_ENV -Append
              break
            }
          }

      - name: Prepare macOS toolchain for rquest
        if: runner.os == 'macOS'
        run: |
          brew install cmake nasm llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked

      - name: Build release binary
        if: ${{ !matrix.use_cross }}
        run: cargo build --locked --release --bin rss2pan --target ${{ matrix.target }}

      - name: Build release binary with cross
        if: ${{ matrix.use_cross }}
        run: cross build --locked --release --bin rss2pan --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          stage_dir="rss2pan-${{ matrix.target }}"
          mkdir -p "$stage_dir"
          cp "target/${{ matrix.target }}/release/rss2pan" "$stage_dir/"
          tar -czf "dist/${{ matrix.archive_name }}" "$stage_dir"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $stageDir = "rss2pan-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stageDir -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/rss2pan.exe" "$stageDir/rss2pan.exe"
          Compress-Archive -Path $stageDir -DestinationPath "dist/${{ matrix.archive_name }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rss2pan-${{ matrix.target }}
          path: dist/${{ matrix.archive_name }}
          retention-days: 14

name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.2.4
        required: true
        type: string
      force_update_existing_tag:
        description: Force move existing tag to the selected commit
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  validate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install native dependencies for rquest
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake perl pkg-config clang libclang-dev nasm

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

  create-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare tag
        id: prepare
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          if [[ -z "$tag" ]]; then
            echo "tag input is required" >&2
            exit 1
          fi
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*([.-][0-9A-Za-z]+)?$ ]]; then
            echo "tag must start with v, for example v0.2.4" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create or update tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.prepare.outputs.tag }}"
          force="${{ inputs.force_update_existing_tag }}"
          git fetch --tags --force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            if [[ "$force" != "true" ]]; then
              echo "tag $tag already exists; enable force_update_existing_tag to move it" >&2
              exit 1
            fi
            git tag -f "$tag" "$GITHUB_SHA"
            git push --force origin "refs/tags/$tag"
          else
            git tag "$tag" "$GITHUB_SHA"
            git push origin "refs/tags/$tag"
          fi

      - name: Wait for tag-triggered release run
        shell: bash
        run: |
          echo "tag ${{ steps.prepare.outputs.tag }} has been pushed."
          echo "The publish workflow will continue in the tag-triggered run."

  release:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          body_path: ./CHANGELOG.md

  upload-assets:
    if: github.event_name == 'push'
    needs:
      - validate
      - release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.ref_name }}

      - name: Prepare Linux toolchain for rquest
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake perl pkg-config clang libclang-dev nasm
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools
          fi

      - name: Prepare Windows toolchain for rquest
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cmakeCandidates = @(
            'C:\Program Files\CMake\bin',
            'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin',
            'C:\Program Files\Microsoft Visual Studio\2022\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin'
          )
          foreach ($path in $cmakeCandidates) {
            if (Test-Path (Join-Path $path 'cmake.exe')) {
              $path | Out-File -FilePath $env:GITHUB_PATH -Append
              break
            }
          }

          if (-not (Get-Command nasm -ErrorAction SilentlyContinue)) {
            choco install nasm llvm -y --no-progress
          }

          $clangCandidates = @(
            'C:\Program Files\LLVM\bin',
            'C:\Program Files (x86)\LLVM\bin',
            'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Tools\Llvm\x64\bin',
            'C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Tools\Llvm\x64\bin'
          )
          foreach ($path in $clangCandidates) {
            if (Test-Path (Join-Path $path 'libclang.dll')) {
              "LIBCLANG_PATH=$path" | Out-File -FilePath $env:GITHUB_ENV -Append
              break
            }
          }

      - name: Prepare macOS toolchain for rquest
        if: runner.os == 'macOS'
        run: |
          brew install cmake nasm llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: rss2pan
          ref: refs/tags/${{ github.ref_name }}
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}

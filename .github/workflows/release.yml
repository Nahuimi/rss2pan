name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install native dependencies for rquest
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake perl pkg-config clang libclang-dev nasm

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ./CHANGELOG.md

  upload-assets:
    needs:
      - validate
      - release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Linux toolchain for rquest
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake perl pkg-config clang libclang-dev nasm
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools
          fi

      - name: Prepare Windows toolchain for rquest
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cmakeCandidates = @(
            'C:\Program Files\CMake\bin',
            'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin',
            'C:\Program Files\Microsoft Visual Studio\2022\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin'
          )
          foreach ($path in $cmakeCandidates) {
            if (Test-Path (Join-Path $path 'cmake.exe')) {
              $path | Out-File -FilePath $env:GITHUB_PATH -Append
              break
            }
          }

          if (-not (Get-Command nasm -ErrorAction SilentlyContinue)) {
            choco install nasm llvm -y --no-progress
          }

          $clangCandidates = @(
            'C:\Program Files\LLVM\bin',
            'C:\Program Files (x86)\LLVM\bin',
            'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Tools\Llvm\x64\bin',
            'C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Tools\Llvm\x64\bin'
          )
          foreach ($path in $clangCandidates) {
            if (Test-Path (Join-Path $path 'libclang.dll')) {
              "LIBCLANG_PATH=$path" | Out-File -FilePath $env:GITHUB_ENV -Append
              break
            }
          }

      - name: Prepare macOS toolchain for rquest
        if: runner.os == 'macOS'
        run: |
          brew install cmake nasm llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: rss2pan
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}
